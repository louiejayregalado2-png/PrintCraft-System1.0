<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Orders | Print & Craft</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="css/orders.css">

</head>

<body>

<div class="layout">

<!-- Sidebar -->

<aside class="sidebar">

<div class="brand">

<div class="brand-icon">

<i class="bi bi-printer-fill"></i>

</div>

<h2>Print & Craft</h2>

<p>Management System</p>

</div>

<nav>

<a href="index.html">

<i class="bi bi-grid-fill"></i>

<span>Dashboard</span>

</a>

<a href="orders.html"
class="active">

<i class="bi bi-cart-fill"></i>

<span>Orders</span>

</a>

<a href="inventory.html">

<i class="bi bi-box-seam-fill"></i>

<span>Inventory</span>

</a>

</nav>

</aside>

<!-- CONTENT -->

<div class="content">

<header class="header">

<div>

<h1>Orders</h1>

<p>

Manage customer orders

</p>

</div>

<button
class="btn-purple"
data-bs-toggle="modal"
data-bs-target="#orderModal">

<i class="bi bi-plus-circle-fill"></i>

Add Order

</button>

</header>

<!-- TOOLBAR -->

<div class="toolbar">

<div class="search">

<i class="bi bi-search"></i>

<input
id="searchOrder"
type="text"
placeholder="Search customer...">

</div>

<select
id="statusFilter">

<option value="">All Status</option>

<option>Pending</option>

<option>Completed</option>

<option>Cancelled</option>

</select>

</div>

<!-- TABLE -->

<div class="table-card">

<div class="table-responsive">

<table>

<thead>

<tr>

<th>ID</th>

<th>Customer</th>

<th>Platform</th>

<th>Product</th>

<th>Qty</th>

<th>Total</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

<!-- ORDER MODAL -->

<div
class="modal fade"
id="orderModal"
tabindex="-1">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

Add Order

</h5>

<button
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6 mb-3">

<label>

Customer Name

</label>

<input
type="text"
id="customerName"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>

Platform

</label>

<select
id="platform"
class="form-select">

<option>Facebook</option>

<option>Shopee</option>

<option>Walk-in</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>

Product

</label>

<select
id="productSelect"
class="form-select">

</select>

</div>

<div class="col-md-3 mb-3">

<label>

Quantity

</label>

<input
type="number"
id="quantity"
class="form-control"
value="1">

</div>

<div class="col-md-3 mb-3">

<label>

Total

</label>

<input
type="number"
id="total"
class="form-control">

</div>
<div class="col-md-6 mb-3">

<label>

Order Status

</label>

<select
id="status"
class="form-select">

<option>Pending</option>

<option>Completed</option>

<option>Cancelled</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>

Order Date

</label>

<input
type="date"
id="orderDate"
class="form-control">

</div>

<div class="col-12 mb-3">

<label>

Notes

</label>

<textarea
id="notes"
class="form-control"
rows="4"></textarea>

</div>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancel

</button>

<button
class="btn btn-primary"
id="saveOrder">

Save Order

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/orders.js"></script>

</body>

</html>
