<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventory | Print & Craft Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/inventory.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="brand">

            <div class="brand-icon">

                <i class="bi bi-printer-fill"></i>

            </div>

            <h2>Print & Craft</h2>

            <p>Management System</p>

        </div>

        <nav>

            <a href="index.html">

                <i class="bi bi-grid-fill"></i>

                Dashboard

            </a>

            <a href="orders.html">

                <i class="bi bi-cart-fill"></i>

                Orders

            </a>

            <a href="inventory.html" class="active">

                <i class="bi bi-box-seam-fill"></i>

                Inventory

            </a>

        </nav>

    </aside>

    <!-- Main -->

    <main class="content">

        <header class="header">

            <div>

                <h1>Inventory</h1>

                <span>Manage all your products</span>

            </div>

            <button
            class="btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#productModal">

                <i class="bi bi-plus-circle-fill"></i>

                Add Product

            </button>

        </header>

        <!-- Toolbar -->

        <section class="toolbar">

            <div class="search">

                <i class="bi bi-search"></i>

                <input
                type="text"
                id="searchProduct"
                placeholder="Search Product...">

            </div>

            <select id="categoryFilter">

                <option value="">All Categories</option>

                <option>Polaroid</option>

                <option>Photostrip</option>

                <option>Bracelet</option>

                <option>Frame</option>

                <option>Keychain</option>

                <option>3D Frame</option>

            </select>

        </section>

        <!-- Table -->

        <div class="table-container">

            <table id="inventoryTable">

                <thead>

                    <tr>

                        <th>Image</th>

                        <th>Product</th>

                        <th>Category</th>

                        <th>Price</th>

                        <th>Stock</th>

                        <th>Status</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="productTable">

                </tbody>

            </table>

        </div>

    </main>

</div>

<!-- Product Modal -->

<div
class="modal fade"
id="productModal"
tabindex="-1">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

Add Product

</h5>

<button
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6 mb-3">

<label>

Product Name

</label>

<input
type="text"
id="productName"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>

Category

</label>

<select
id="productCategory"
class="form-select">

<option>Polaroid</option>

<option>Photostrip</option>

<option>Bracelet</option>

<option>Frame</option>

<option>Keychain</option>

<option>3D Frame</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label>

Price

</label>

<input
type="number"
id="productPrice"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

Stock

</label>

<input
type="number"
id="productStock"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

Low Stock

</label>

<input
type="number"
id="lowStock"
class="form-control"
value="10">

</div>

<div class="col-12 mb-3">

<label>

Image

</label>

<input
type="file"
id="productImage"
class="form-control"
accept="image/*">

</div>

<div class="col-12">

<label>

Description

</label>

<textarea
id="description"
rows="4"
class="form-control"></textarea>

</div>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancel

</button>

<button
class="btn btn-primary"
id="saveProduct">

Save Product

</button>

</div>

</div>

</div>

</div>

<!-- Delete Modal -->

<div class="modal fade" id="deleteModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Delete Product

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <p>

                    Are you sure you want to delete this product?

                </p>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                    class="btn btn-danger"
                    id="confirmDelete">

                    Delete

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/inventory.js"></script>

</body>

</html>
